services:
  - type: web
    name: loopwalker
    env: python
    plan: free
    autoDeploy: true
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python -m uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ORS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
